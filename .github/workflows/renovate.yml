name: Renovate

on:
  merge_group:
  schedule:
    - cron: "0 * * * *"
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      lane:
        description: |
          Which runner to run on. Renovate mutates state (opens PRs), so it runs
          on a single runner — never both. velnor (default) or github.
        type: choice
        default: velnor
        options: [velnor, github]

concurrency:
  group: renovate
  cancel-in-progress: true

jobs:
  renovate:
    name: Renovate (${{ (github.event_name == 'workflow_dispatch' && inputs.lane == 'github') && 'GitHub' || 'Velnor' }})
    runs-on: ${{ (github.event_name == 'workflow_dispatch' && inputs.lane == 'github') && fromJSON('"ubuntu-latest"') || fromJSON('["self-hosted","velnor-target-mvp"]') }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Self-hosted Renovate
        uses: renovatebot/github-action@3064367f740a1a91cca218698a63902689cce200 # v46.1.20
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_ONBOARDING: false
          LOG_LEVEL: debug
          RENOVATE_HOST_RULES: '[{"matchHost":"index.docker.io","username":"${{ secrets.DOCKERHUB_USERNAME }}","password":"${{ secrets.DOCKERHUB_TOKEN }}"}]'
