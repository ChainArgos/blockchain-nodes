name: Build And Publish All

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      lane:
        description: "Runner lane for all builds: velnor (default), github, or hetzner."
        type: choice
        default: velnor
        options: [velnor, github, hetzner]

permissions:
  contents: read

jobs:
  docker-debian-blockchain-base:
    uses: ./.github/workflows/build-image.yml
    secrets: inherit
    with:
      lane: ${{ inputs.lane || 'velnor' }}
      package: debian-blockchain-base

  docker-debian-blockchain-build:
    needs: docker-debian-blockchain-base
    uses: ./.github/workflows/build-image.yml
    secrets: inherit
    with:
      lane: ${{ inputs.lane || 'velnor' }}
      package: debian-blockchain-build

  docker-arbitrum:
    needs: docker-debian-blockchain-build
    uses: ./.github/workflows/build-image.yml
    secrets: inherit
    with:
      lane: ${{ inputs.lane || 'velnor' }}
      package: arbitrum

  docker-avalanchego:
