name: Build And Publish All

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      lane:
        description: |
          Which runner(s) to build on. Use both for parity: GitHub-hosted and Velnor jobs run in the same workflow run.
        type: choice
        default: both
        options: [velnor, github, both]

permissions:
  contents: read

jobs:
  docker-debian-blockchain-base:
    strategy:
      fail-fast: false
      matrix:
        lane: ${{ fromJSON((github.event_name != 'workflow_dispatch' || inputs.lane == 'both') && '["GitHub","Velnor"]' || ((github.event_name == 'workflow_dispatch' && inputs.lane == 'github') && '["GitHub"]' || '["Velnor"]')) }}
    uses: ./.github/workflows/build-image.yml
    secrets: inherit
    with:
      package: debian-blockchain-base
      runner: ${{ matrix.lane == 'GitHub' && '"ubuntu-latest"' || '["self-hosted","velnor-target-mvp"]' }}

  docker-debian-blockchain-build:
    needs: docker-debian-blockchain-base
    strategy:
      fail-fast: false
      matrix:
        lane: ${{ fromJSON((github.event_name != 'workflow_dispatch' || inputs.lane == 'both') && '["GitHub","Velnor"]' || ((github.event_name == 'workflow_dispatch' && inputs.lane == 'github') && '["GitHub"]' || '["Velnor"]')) }}
