name: Build And Publish All

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      lane:
        description: |
          Which runner(s) to build on. Use both for parity: GitHub-hosted and Velnor jobs run in the same workflow run.
        type: choice
        default: both
        options: [velnor, github, both]

permissions:
  contents: read

jobs:
  docker-debian-blockchain-base:
    name: docker-debian-blockchain-base (${{ matrix.config.lane }})
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON((github.event_name != 'workflow_dispatch' || inputs.lane == 'both') && '[{"lane":"GitHub","runner":"\"ubuntu-latest\""},{"lane":"Velnor","runner":"[\"self-hosted\",\"velnor-target-mvp\"]"}]' || ((github.event_name == 'workflow_dispatch' && inputs.lane == 'github') && '[{"lane":"GitHub","runner":"\"ubuntu-latest\""}]' || '[{"lane":"Velnor","runner":"[\"self-hosted\",\"velnor-target-mvp\"]"}]')) }}
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    concurrency:
      group: build-${{ matrix.config.lane }}-debian-blockchain-base
      cancel-in-progress: false
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install_args: "cargo:rust-script"

      - name: Cache rust-script
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/rust-script
          key: rust-script-${{ runner.os }}-${{ hashFiles('**/*.rs', '**/build.toml') }}
          restore-keys: |
            rust-script-${{ runner.os }}-

      - name: Check if image exists
        id: check-image
        run: |
          if [ "$(mise run exists debian-blockchain-base)" = "true" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Image debian-blockchain-base already exists, skipping build"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Image debian-blockchain-base does not exist, will build"
          fi

      - name: Login to Docker Hub
        if: steps.check-image.outputs.exists == 'false'
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Set up QEMU
        if: steps.check-image.outputs.exists == 'false'
        run: docker run --rm --privileged tonistiigi/binfmt:latest --install all

      - name: Initialize Docker Buildx
        if: steps.check-image.outputs.exists == 'false'
        run: docker buildx create --driver docker-container --use

      - name: Build Docker image
        if: steps.check-image.outputs.exists == 'false'
        run: mise run build debian-blockchain-base
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

