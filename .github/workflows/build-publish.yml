name: Build And Publish All

# Builds every docker-* image whose version tag is missing from Docker Hub.
#
# Structure:
#   matrix-setup  – picks the runner lane(s) and sweeps Docker Hub once to
#                   compute the set of leaf packages that actually need a
#                   build (a no-op push costs one short job instead of 36).
#   base          – debian-blockchain-base (root of the image chain)
#   build         – debian-blockchain-build (depends on base)
#   packages      – one matrix job per missing leaf package
#
# Layer caching: docker-build.rs pushes/pulls a per-package, per-platform
# registry cache (chainargos/<pkg>:buildcache-<arch>) when BUILDX_CACHE
# is set, so repeat builds reuse layers instead of starting cold.

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      lane:
        description: |
          Which runner(s) to build on. Use both for parity: GitHub-hosted and Velnor jobs run in the same workflow run.
        type: choice
        default: velnor
        options: [velnor, github, both]

permissions:
  contents: read

# Stacked pushes collapse: the running build finishes, only the newest
# superseded run stays queued (GitHub cancels intermediate pending runs in
# the same group).
concurrency:
  group: build-publish-${{ github.ref }}
  cancel-in-progress: false

env:
  BUILDX_CACHE: registry

jobs:
  matrix-setup:
    name: Select runner lane and missing packages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      configs: ${{ steps.set.outputs.configs }}
      packages: ${{ steps.sweep.outputs.packages }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - id: set
        env:
          LANE: ${{ github.event_name == 'workflow_dispatch' && inputs.lane || 'velnor' }}
        run: |
          github='{"lane":"GitHub","runner":"\"ubuntu-latest\""}'
          velnor='{"lane":"Velnor","runner":"[\"self-hosted\",\"velnor-target-mvp\"]"}'
          case "$LANE" in
            github) configs="[$github]" ;;
            both)   configs="[$github,$velnor]" ;;
            *)      configs="[$velnor]" ;;
          esac
          echo "configs=$configs" >> "$GITHUB_OUTPUT"

      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install_args: "cargo:rust-script"

      - name: Cache rust-script
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/rust-script
          key: rust-script-sweep-${{ runner.os }}-${{ hashFiles('**/*.rs') }}
          restore-keys: |
            rust-script-sweep-${{ runner.os }}-

      - name: Sweep Docker Hub for missing leaf packages
        id: sweep
        run: |
          missing=()
          for dir in docker-*/; do
            pkg=${dir#docker-}
            pkg=${pkg%/}
            case "$pkg" in
              debian-blockchain-base|debian-blockchain-build) continue ;;
            esac
            if [ "$(mise run exists "$pkg")" != "true" ]; then
              missing+=("$pkg")
              echo "missing: $pkg"
            fi
          done
          if [ "${#missing[@]}" -eq 0 ]; then
            packages='[]'
            echo "All leaf images already exist on Docker Hub."
          else
            packages=$(printf '%s\n' "${missing[@]}" | jq -R . | jq -cs .)
          fi
          echo "packages=$packages" >> "$GITHUB_OUTPUT"

  base:
    needs: matrix-setup
    name: docker-debian-blockchain-base (${{ matrix.config.lane }})
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.matrix-setup.outputs.configs) }}
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    timeout-minutes: 180
    concurrency:
      group: build-${{ matrix.config.lane }}-debian-blockchain-base
      cancel-in-progress: false
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install_args: "cargo:rust-script"

      - name: Cache rust-script
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/rust-script
          key: rust-script-${{ matrix.config.lane }}-${{ runner.os }}-${{ hashFiles('**/*.rs') }}
          restore-keys: |
            rust-script-${{ matrix.config.lane }}-${{ runner.os }}-

      - name: Check if image exists
        id: check-image
        run: |
          if [ "$(mise run exists debian-blockchain-base)" = "true" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Image debian-blockchain-base already exists, skipping build"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Image debian-blockchain-base does not exist, will build"
          fi

      - name: Login to Docker Hub
        if: steps.check-image.outputs.exists == 'false'
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Set up QEMU
        if: steps.check-image.outputs.exists == 'false'
        run: docker run --rm --privileged tonistiigi/binfmt:latest --install all

      - name: Initialize Docker Buildx
        if: steps.check-image.outputs.exists == 'false'
        run: docker buildx create --name bcn-ci --driver docker-container --use 2>/dev/null || docker buildx use bcn-ci

      - name: Build Docker image
        if: steps.check-image.outputs.exists == 'false'
        run: mise run build debian-blockchain-base
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: [matrix-setup, base]
    name: docker-debian-blockchain-build (${{ matrix.config.lane }})
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.matrix-setup.outputs.configs) }}
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    timeout-minutes: 180
    concurrency:
      group: build-${{ matrix.config.lane }}-debian-blockchain-build
      cancel-in-progress: false
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install_args: "cargo:rust-script"

      - name: Cache rust-script
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/rust-script
          key: rust-script-${{ matrix.config.lane }}-${{ runner.os }}-${{ hashFiles('**/*.rs') }}
          restore-keys: |
            rust-script-${{ matrix.config.lane }}-${{ runner.os }}-

      - name: Check if image exists
        id: check-image
        run: |
          if [ "$(mise run exists debian-blockchain-build)" = "true" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Image debian-blockchain-build already exists, skipping build"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Image debian-blockchain-build does not exist, will build"
          fi

      - name: Login to Docker Hub
        if: steps.check-image.outputs.exists == 'false'
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Set up QEMU
        if: steps.check-image.outputs.exists == 'false'
        run: docker run --rm --privileged tonistiigi/binfmt:latest --install all

      - name: Initialize Docker Buildx
        if: steps.check-image.outputs.exists == 'false'
        run: docker buildx create --name bcn-ci --driver docker-container --use 2>/dev/null || docker buildx use bcn-ci

      - name: Build Docker image
        if: steps.check-image.outputs.exists == 'false'
        run: mise run build debian-blockchain-build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  packages:
    needs: [matrix-setup, build]
    if: needs.matrix-setup.outputs.packages != '[]'
    name: docker-${{ matrix.package }} (${{ matrix.config.lane }})
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.matrix-setup.outputs.configs) }}
        package: ${{ fromJSON(needs.matrix-setup.outputs.packages) }}
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    timeout-minutes: 180
    concurrency:
      group: build-${{ matrix.config.lane }}-${{ matrix.package }}
      cancel-in-progress: false
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # docker-heimdall ships a 235 MB genesis file through Git LFS.
          lfs: ${{ matrix.package == 'heimdall' }}

      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install_args: "cargo:rust-script"

      - name: Cache rust-script
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/rust-script
          key: rust-script-${{ matrix.config.lane }}-${{ runner.os }}-${{ hashFiles('**/*.rs') }}
          restore-keys: |
            rust-script-${{ matrix.config.lane }}-${{ runner.os }}-

      - name: Check if image exists
        id: check-image
        run: |
          if [ "$(mise run exists "$PACKAGE")" = "true" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Image $PACKAGE already exists, skipping build"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Image $PACKAGE does not exist, will build"
          fi
        env:
          PACKAGE: ${{ matrix.package }}

      - name: Login to Docker Hub
        if: steps.check-image.outputs.exists == 'false'
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Set up QEMU
        if: steps.check-image.outputs.exists == 'false'
        run: docker run --rm --privileged tonistiigi/binfmt:latest --install all

      - name: Initialize Docker Buildx
        if: steps.check-image.outputs.exists == 'false'
        run: docker buildx create --name bcn-ci --driver docker-container --use 2>/dev/null || docker buildx use bcn-ci

      - name: Build Docker image
        if: steps.check-image.outputs.exists == 'false'
        run: mise run build "$PACKAGE"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE: ${{ matrix.package }}
