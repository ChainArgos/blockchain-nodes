name: Build Docker Image

on:
  workflow_call:
    inputs:
      package:
        required: true
        type: string
        description: "Package name to build (e.g., geth, bitcoin-core)"
      enable-lfs:
        required: false
        type: boolean
        default: false
        description: "Enable Git LFS for checkout"
      runner:
        required: false
        type: string
        default: '["self-hosted","velnor-target-mvp"]'
        description: "runs-on value as JSON (default Velnor self-hosted)"

jobs:
  build:
    runs-on: ${{ fromJSON(inputs.runner) }}
    concurrency:
      group: build-${{ inputs.package }}
      cancel-in-progress: false
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          lfs: ${{ inputs.enable-lfs }}

      # mise installs rust-script and provides the mise run task runner,
      # replacing the previous dtolnay/rust-toolchain + baptiste0928/cargo-install
      # combination (failed on Velnor: GITHUB_PATH updates don't propagate between
      # ephemeral node sidecar containers) and extractions/setup-just.
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install_args: "cargo:rust-script"

      - name: Cache rust-script
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/rust-script
          key: rust-script-${{ runner.os }}-${{ hashFiles('**/*.rs', '**/build.toml') }}
          restore-keys: |
            rust-script-${{ runner.os }}-

      - name: Check if image exists
        id: check-image
        run: |
          if [ "$(mise run exists ${{ inputs.package }})" = "true" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Image ${{ inputs.package }} already exists, skipping build"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Image ${{ inputs.package }} does not exist, will build"
          fi

      - name: Login to Docker Hub
        if: steps.check-image.outputs.exists == 'false'
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Set up QEMU
        if: steps.check-image.outputs.exists == 'false'
        run: docker run --rm --privileged tonistiigi/binfmt:latest --install all

      - name: Initialize Docker Buildx
        if: steps.check-image.outputs.exists == 'false'
        run: docker buildx create --driver docker-container --use

      - name: Build Docker image
        if: steps.check-image.outputs.exists == 'false'
        run: mise run build ${{ inputs.package }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
