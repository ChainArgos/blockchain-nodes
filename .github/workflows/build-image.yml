name: Build Docker Image

on:
  workflow_call:
    inputs:
      package:
        required: true
        type: string
        description: "Package name to build (e.g., geth, bitcoin-core)"
      enable-lfs:
        required: false
        type: boolean
        default: false
        description: "Enable Git LFS for checkout"
      runner:
        required: false
        type: string
        default: '["self-hosted","velnor-target-mvp"]'
        description: "runs-on value as JSON (default Velnor self-hosted)"

jobs:
  build:
    runs-on: ${{ fromJSON(inputs.runner) }}
    concurrency:
      group: build-${{ inputs.package }}
      cancel-in-progress: false
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          lfs: ${{ inputs.enable-lfs }}

      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      # mise installs rust-script via cargo and manages PATH correctly in both
      # GitHub-hosted and Velnor self-hosted containers. Replaces the previous
      # dtolnay/rust-toolchain + baptiste0928/cargo-install combination which
      # failed on Velnor because GITHUB_PATH updates did not propagate between steps.
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install_args: "cargo:rust-script"

      - name: Cache rust-script
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/rust-script
          key: rust-script-${{ runner.os }}-${{ hashFiles('**/*.rs', '**/build.toml') }}
          restore-keys: |
            rust-script-${{ runner.os }}-

      - name: Check if image exists
        id: check-image
        run: |
          if [ "$(just exists ${{ inputs.package }})" = "true" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Image ${{ inputs.package }} already exists, skipping build"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Image ${{ inputs.package }} does not exist, will build"
          fi

      - name: Login to Docker Hub
        if: steps.check-image.outputs.exists == 'false'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Initialize Docker Buildx
        if: steps.check-image.outputs.exists == 'false'
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build Docker image
        if: steps.check-image.outputs.exists == 'false'
        run: just build-${{ inputs.package }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
